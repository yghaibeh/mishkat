<!-- @dsCard group="Colors" viewport="700x190" subtitle="محايدات دافئة مائلة للأخضر — النمط الفاتح" name="المحايدات (فاتح)" -->
<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{padding:16px}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:8px}
.sw{height:64px;border-radius:var(--r-sm);border:1px solid var(--border);padding:8px;font-size:11px;line-height:15px}
.sw b{font-weight:600;display:block}.sw span{direction:ltr;display:inline-block;color:var(--text-3)}
</style></head><body>
<div class="row">
<div class="sw" style="background:var(--bg)"><b>bg — الخلفية</b><span>#FBFAF7</span></div>
<div class="sw" style="background:var(--surface)"><b>surface — بطاقة</b><span>#FFFFFF</span></div>
<div class="sw" style="background:var(--surface-2)"><b>surface-2 — غائر</b><span>#F5F3EE</span></div>
<div class="sw" style="background:var(--surface-hover)"><b>hover</b><span>#F1EFE8</span></div>
<div class="sw" style="background:var(--surface);border-color:var(--border-strong)"><b>border / strong</b><span>#E8E5DC · #D6D2C4</span></div>
</div>
<div class="row">
<div class="sw" style="background:var(--text-1);color:#fff"><b style="color:#fff">text-1 نصّ أول</b><span style="color:#cfd8d0">#1B2420</span></div>
<div class="sw" style="background:var(--text-2);color:#fff"><b style="color:#fff">text-2 ثانوي</b><span style="color:#dfe5e0">#4E5B53</span></div>
<div class="sw" style="background:var(--text-3);color:#fff"><b style="color:#fff">text-3 خافت</b><span style="color:#eef1ee">#7E8A81</span></div>
<div class="sw" style="background:var(--text-disabled)"><b>معطّل</b><span>#ABB4AC</span></div>
<div class="sw" style="background:var(--gold);color:#fff"><b style="color:#fff">gold — لمسة هجرية</b><span style="color:#f4ecd8">#8E7434</span></div>
</div>
</body></html>
