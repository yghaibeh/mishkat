<!-- @dsCard group="Colors" viewport="700x150" subtitle="نجاح · تحذير · خطر — نصّ وخلفية وحدّ لكلٍّ" name="الألوان الدلالية" -->
<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{padding:16px}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sem{border-radius:var(--r-md);padding:12px 14px;border:1px solid}
.sem b{font-weight:700;font-size:var(--fs-body)}
.sem div{font-size:11px;direction:ltr;text-align:right;opacity:.8;line-height:16px;margin-top:4px}
</style></head><body>
<div class="row">
<div class="sem" style="background:var(--success-bg);border-color:var(--success-border);color:var(--success-fg)"><b>نجاح / معتمد</b><div>#1F6B45 on #E7F1EA</div></div>
<div class="sem" style="background:var(--warning-bg);border-color:var(--warning-border);color:var(--warning-fg)"><b>تحذير / معلّق</b><div>#7A5104 on #FAF2DE</div></div>
<div class="sem" style="background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger-fg)"><b>خطر / متأخر</b><div>#A32B22 on #FAECEA</div></div>
</div>
</body></html>
