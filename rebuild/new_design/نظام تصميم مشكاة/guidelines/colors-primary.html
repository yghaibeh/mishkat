<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{padding:16px;background:var(--surface)}
.row{display:grid;grid-template-columns:repeat(11,1fr);gap:6px}
.sw{height:84px;border-radius:var(--r-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:11px;line-height:15px;font-family:var(--font)}
.sw b{font-weight:600}.sw span{direction:ltr;text-align:right;opacity:.85}
</style></head><body>
<div class="row">
<div class="sw" style="background:var(--green-50);color:#123D2A"><b>٥٠</b><span>#F0F5F1</span></div>
<div class="sw" style="background:var(--green-100);color:#123D2A"><b>١٠٠</b><span>#E2ECE4</span></div>
<div class="sw" style="background:var(--green-200);color:#123D2A"><b>٢٠٠</b><span>#C6DACB</span></div>
<div class="sw" style="background:var(--green-300);color:#0B2519"><b>٣٠٠</b><span>#9FC0A9</span></div>
<div class="sw" style="background:var(--green-400);color:#fff"><b>٤٠٠</b><span>#6FA383</span></div>
<div class="sw" style="background:var(--green-500);color:#fff"><b>٥٠٠</b><span>#468563</span></div>
<div class="sw" style="background:var(--green-600);color:#fff"><b>٦٠٠</b><span>#2E7852</span></div>
<div class="sw" style="background:var(--green-700);color:#fff;outline:2px solid var(--green-950);outline-offset:2px"><b>٧٠٠ الهوية</b><span>#1F6B45</span></div>
<div class="sw" style="background:var(--green-800);color:#fff"><b>٨٠٠</b><span>#185338</span></div>
<div class="sw" style="background:var(--green-900);color:#fff"><b>٩٠٠</b><span>#123D2A</span></div>
<div class="sw" style="background:var(--green-950);color:#fff"><b>٩٥٠</b><span>#0B2519</span></div>
</div>
</body></html>
