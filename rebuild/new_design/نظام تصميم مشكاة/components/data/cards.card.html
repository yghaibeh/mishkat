<!-- @dsCard group="Components" viewport="700x360" subtitle="StatCard · بطاقة تقدّم بحلقة وشريط" name="بطاقات الأرقام والتقدّم" -->
<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
body{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-5);box-shadow:var(--shadow-1);display:flex;flex-direction:column;gap:4px;min-width:0}
.stat .l{font-size:var(--fs-caption);line-height:var(--lh-caption);color:var(--text-2);font-weight:500}
.stat .v{font-size:var(--fs-display);line-height:var(--lh-display);font-weight:700;letter-spacing:-.01em}
.stat .c{display:flex;align-items:center;gap:6px;font-size:var(--fs-caption);color:var(--text-3)}
.ic{display:inline-block;width:14px;height:14px;background:currentColor;-webkit-mask:var(--m) center/contain no-repeat;mask:var(--m) center/contain no-repeat;flex:none}
.pc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-5);box-shadow:var(--shadow-2);display:flex;align-items:center;gap:var(--sp-5);flex:1}
</style></head><body>
<div class="grid">
<div class="stat"><span class="l">مساجد أدخلت سجل اليوم</span><span class="v">٣١٢ <span style="font-size:var(--fs-body);color:var(--text-2);font-weight:500">من ٤٠٠</span></span><span class="c"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/trending-up.svg);background:var(--success-fg)"></i>أعلى من أمس</span></div>
<div class="stat"><span class="l">اعتمادات متأخرة</span><span class="v" style="color:var(--danger-fg)">١٧</span><span class="c">تجاوزت ٤٨ ساعة</span></div>
<div class="stat"><span class="l">حلقات نشطة هذا الأسبوع</span><span class="v" style="color:var(--success-fg)">٨٩٪</span><span class="c"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/minus.svg)"></i>ثابت</span></div>
</div>
<div style="display:flex;gap:12px">
<div class="pc">
<div style="position:relative;width:104px;height:104px;flex:none">
<svg width="104" height="104" viewBox="0 0 104 104" style="transform:scaleX(-1) rotate(-90deg)">
<circle cx="52" cy="52" r="44" fill="none" stroke="var(--surface-2)" stroke-width="9"/>
<circle cx="52" cy="52" r="44" fill="none" stroke="var(--primary)" stroke-width="9" stroke-linecap="round" stroke-dasharray="276.46" stroke-dashoffset="114.53"/>
</svg>
<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
<span style="font-size:26px;font-weight:700;line-height:1">٤١</span><span style="font-size:11px;color:var(--text-3);margin-top:2px">من ٧٠</span>
</div>
</div>
<div style="display:flex;flex-direction:column;gap:6px;min-width:0">
<span style="font-size:var(--fs-section);font-weight:600">أين أنا من هدف الأسبوع؟</span>
<span style="color:var(--text-2)">بقي ٢٩ نقطة</span>
<span style="font-size:var(--fs-caption);color:var(--text-3)">آخر إدخال أمس: نشاطان</span>
</div>
</div>
<div class="pc" style="align-items:stretch">
<div style="display:flex;flex-direction:column;gap:6px;flex:1;justify-content:center">
<span style="font-size:var(--fs-section);font-weight:600">إنجاز خطة الشهر</span>
<span style="font-size:var(--fs-display);line-height:1.1;font-weight:700">٤١ <span style="font-size:var(--fs-body);color:var(--text-2);font-weight:500">من ٧٠ نقطة</span></span>
<div style="height:8px;border-radius:var(--r-full);background:var(--surface-2);overflow:hidden"><div style="width:59%;height:100%;border-radius:var(--r-full);background:var(--primary)"></div></div>
<span style="font-size:var(--fs-caption);color:var(--text-3)">النسخة الشريطية — للمساحات الضيقة</span>
</div>
</div>
</div>
</body></html>
