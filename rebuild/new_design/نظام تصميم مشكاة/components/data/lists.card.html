<!-- @dsCard group="Components" viewport="700x400" subtitle="ListItem · جدول قابل للفرز · Timeline" name="القوائم والجداول" -->
<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
body{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.lbl{font-size:11px;color:var(--text-3)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-1)}
.li{display:flex;align-items:center;gap:12px;padding:12px 16px;min-height:64px;background:var(--surface)}
.li+.li{border-top:1px solid var(--border)}
.av{width:40px;height:40px;border-radius:var(--r-full);background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;flex:none}
.ti{flex:1;min-width:0}.ti b{display:block;font-size:var(--fs-body);font-weight:600}.ti span{font-size:var(--fs-caption);color:var(--text-2)}
.chip{display:inline-flex;border-radius:var(--r-full);padding:3px 12px;font-size:var(--fs-caption);font-weight:600;border:1px solid}
.ic{display:inline-block;width:18px;height:18px;background:currentColor;-webkit-mask:var(--m) center/contain no-repeat;mask:var(--m) center/contain no-repeat;flex:none}
table{width:100%;border-collapse:collapse;font-size:var(--fs-body)}
th{text-align:start;padding:10px 16px;font-size:var(--fs-caption);font-weight:600;color:var(--text-2);background:var(--surface-2);white-space:nowrap}
td{padding:12px 16px;border-top:1px solid var(--border)}
.tl{display:flex;align-items:flex-start;max-width:360px}
.tl .st{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:64px}
.tl .ln{flex:1;height:2px;margin-top:13px;border-radius:1px}
.tl .ci{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center}
</style></head><body>
<div style="display:flex;gap:16px;align-items:flex-start">
<div style="flex:1.2;display:flex;flex-direction:column;gap:8px">
<span class="lbl">ListItem — بحالة، بذيل حضور، معطّل</span>
<div class="card">
<div class="li ds-hover" style="cursor:pointer"><span class="av">أ‍ص</span><div class="ti"><b>أحمد الصفدي</b><span>جزء عمّ · حفظ جديد</span></div><span class="chip" style="background:var(--success-bg);color:var(--success-fg);border-color:var(--success-border)">معتمد</span><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/chevron-left.svg);background:var(--text-3)"></i></div>
<div class="li"><span class="av" style="background:var(--gold-bg);color:var(--gold)">م‍ع</span><div class="ti"><b>محمود العلي</b><span>سورة النبأ</span></div><span class="chip" style="background:var(--warning-bg);color:var(--warning-fg);border-color:var(--warning-border)">معلّق</span></div>
<div class="li" style="opacity:.5"><span class="av" style="background:var(--surface-2);color:var(--text-2)">خ‍ح</span><div class="ti"><b>خالد الحمصي</b><span>منقطع مؤقتاً</span></div><span class="chip" style="background:var(--danger-bg);color:var(--danger-fg);border-color:var(--danger-border)">متأخر</span></div>
</div>
</div>
<div style="flex:1;display:flex;flex-direction:column;gap:8px">
<span class="lbl">Timeline — خطة ⟵ اعتماد ⟵ صرف</span>
<div class="card" style="padding:20px 16px">
<div class="tl">
<span class="st"><span class="ci" style="background:var(--primary);color:var(--on-primary)"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/check.svg);width:14px;height:14px"></i></span><span style="font-size:var(--fs-caption);font-weight:600">خطة</span><span style="font-size:11px;color:var(--text-3);margin-top:-4px">٥ محرم</span></span>
<span class="ln" style="background:var(--primary)"></span>
<span class="st"><span class="ci" style="background:var(--primary-soft);border:2px solid var(--primary);color:var(--primary)"><span style="width:8px;height:8px;border-radius:50%;background:currentColor"></span></span><span style="font-size:var(--fs-caption);font-weight:600;color:var(--primary)">اعتماد</span><span style="font-size:11px;color:var(--text-3);margin-top:-4px">جارٍ</span></span>
<span class="ln" style="background:var(--border-strong)"></span>
<span class="st"><span class="ci" style="background:var(--surface-2);color:var(--text-3)"><span style="width:8px;height:8px;border-radius:50%;background:currentColor"></span></span><span style="font-size:var(--fs-caption);color:var(--text-3)">صرف</span></span>
</div>
</div>
<span class="lbl" style="margin-top:6px">فرز الجدول: سهم أخضر على العمود الفعّال</span>
</div>
</div>
<div class="card">
<table>
<thead><tr>
<th><span style="display:inline-flex;align-items:center;gap:4px">المنطقة<i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/chevrons-up-down.svg);width:13px;height:13px;background:var(--text-3)"></i></span></th>
<th><span style="display:inline-flex;align-items:center;gap:4px">نسبة الإدخال<i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/arrow-down.svg);width:13px;height:13px;background:var(--primary)"></i></span></th>
<th>المتأخر</th>
</tr></thead>
<tbody>
<tr class="ds-hover"><td style="font-weight:600">حمص</td><td>٩٤٪</td><td>٣</td></tr>
<tr class="ds-hover"><td style="font-weight:600">حماة</td><td>٨١٪</td><td style="color:var(--danger-fg);font-weight:600">٧</td></tr>
</tbody>
</table>
</div>
</body></html>
