<!-- @dsCard group="Components" viewport="700x400" subtitle="مفتاح الحضور · SegmentedControl · الزر اللاصق" name="مفاتيح وتحكّمات" -->
<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
body{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.lbl{font-size:11px;color:var(--text-3);min-width:88px;flex:none}
.pillbox{display:inline-flex;background:var(--surface-2);border-radius:var(--r-full);padding:3px;gap:2px}
.pseg{display:flex;align-items:center;justify-content:center;gap:6px;min-width:64px;height:44px;padding:0 10px;border:0;border-radius:var(--r-full);font:600 var(--fs-caption)/1 var(--font);background:transparent;color:var(--text-3);cursor:pointer}
.ic{display:inline-block;width:18px;height:18px;background:currentColor;-webkit-mask:var(--m) center/contain no-repeat;mask:var(--m) center/contain no-repeat}
.seg{height:34px;padding:0 16px;border-radius:var(--r-full);border:0;background:transparent;color:var(--text-2);font:400 var(--fs-caption)/1 var(--font);cursor:pointer}
.seg.on{background:var(--surface);color:var(--text-1);font-weight:600;box-shadow:var(--shadow-1)}
</style></head><body>
<div class="row"><span class="lbl">حضور — لم يُسجَّل</span>
<span class="pillbox">
<button class="pseg"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/check.svg)"></i>حاضر</button>
<button class="pseg"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/x.svg)"></i>غائب</button>
</span>
<span class="lbl" style="min-width:40px">حاضر</span>
<span class="pillbox">
<button class="pseg" style="background:var(--primary);color:var(--on-primary);box-shadow:var(--shadow-1)"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/check.svg)"></i>حاضر</button>
<button class="pseg"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/x.svg)"></i>غائب</button>
</span>
</div>
<div class="row"><span class="lbl">غائب</span>
<span class="pillbox">
<button class="pseg"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/check.svg)"></i>حاضر</button>
<button class="pseg" style="background:var(--danger-bg);color:var(--danger-fg);box-shadow:var(--shadow-1)"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/x.svg)"></i>غائب</button>
</span>
<span class="lbl" style="min-width:48px">مضغوط</span>
<span class="pillbox">
<button class="pseg" style="min-width:44px;background:var(--primary);color:var(--on-primary)"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/check.svg)"></i></button>
<button class="pseg" style="min-width:44px"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/x.svg)"></i></button>
</span>
<span class="lbl" style="min-width:40px">معطّل</span>
<span class="pillbox" style="opacity:.5">
<button class="pseg" style="min-width:44px;cursor:default"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/check.svg)"></i></button>
<button class="pseg" style="min-width:44px;cursor:default"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/x.svg)"></i></button>
</span>
</div>
<div class="row"><span class="lbl">Segmented</span>
<span class="pillbox"><button class="seg on">صباحية</button><button class="seg">مسائية</button></span>
<span class="pillbox"><button class="seg on">أسبوع</button><button class="seg">شهر</button><button class="seg">فصل</button></span>
<span class="pillbox" style="opacity:.5"><button class="seg on" style="cursor:default">معطّل</button><button class="seg" style="cursor:default">خيار</button></span>
</div>
<div class="row" style="align-items:flex-start"><span class="lbl" style="margin-top:26px">الزر اللاصق</span>
<div style="width:358px;border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;background:var(--bg)">
<div style="height:36px;background:linear-gradient(to top, var(--bg) 62%, transparent)"></div>
<div style="padding:0 16px 14px;background:var(--bg);display:flex;flex-direction:column;gap:8px">
<div style="font-size:var(--fs-caption);color:var(--text-2);text-align:center">حضر ٦ من ٨ — يمكنك التعديل بعد الحفظ</div>
<button class="ds-btn" style="width:100%;height:56px;border:0;border-radius:var(--r-md);background:var(--primary);color:var(--on-primary);font:600 var(--fs-body)/1 var(--font);box-shadow:var(--shadow-3);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
<i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/pen-line.svg)"></i>إدخال سجل اليوم</button>
</div>
</div>
</div>
</body></html>
