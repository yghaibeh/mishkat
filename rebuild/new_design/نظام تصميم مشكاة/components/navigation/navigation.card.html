<!-- @dsCard group="Components" viewport="700x400" subtitle="AppBar · شريط سفلي · Tabs · شريط جانبي" name="التنقّل" -->
<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
body{padding:16px 20px;display:flex;gap:20px;align-items:flex-start}
.col{display:flex;flex-direction:column;gap:14px;flex:1;min-width:0}
.lbl{font-size:11px;color:var(--text-3)}
.ic{display:inline-block;width:21px;height:21px;background:currentColor;-webkit-mask:var(--m) center/contain no-repeat;mask:var(--m) center/contain no-repeat;flex:none}
.frame{border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;background:var(--bg)}
.navi{flex:1;min-width:0;height:60px;border:0;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--text-3);cursor:pointer;position:relative}
.navi span.pill{display:flex;align-items:center;justify-content:center;width:44px;height:26px;border-radius:var(--r-full)}
.navi span.t{font-size:10px;line-height:14px;white-space:nowrap}
.tab{display:flex;align-items:center;gap:6px;padding:10px 14px;border:0;background:transparent;color:var(--text-2);font:400 var(--fs-body)/1.2 var(--font);cursor:pointer;margin-bottom:-1px}
.side{display:flex;align-items:center;gap:12px;height:40px;padding:0 12px;border:0;border-radius:var(--r-sm);background:transparent;color:var(--text-2);font:400 var(--fs-body)/1 var(--font);cursor:pointer;text-align:start;width:100%}
.side .ic{width:19px;height:19px}
</style></head><body>
<div class="col" style="flex:1.3">
<span class="lbl">AppBar — عنوان + شارة دور + جرس بعدّاد + سطر نطاق</span>
<div class="frame">
<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;min-height:56px">
<div style="flex:1;min-width:0">
<div style="display:flex;align-items:center;gap:8px">
<span style="font-size:var(--fs-title);line-height:var(--lh-title);font-weight:700">مشكاة</span>
<span style="background:var(--primary-soft);color:var(--primary);border-radius:var(--r-full);padding:1px 10px;font-size:12px;font-weight:600">أمير المسجد</span>
</div>
<div style="font-size:var(--fs-caption);color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">مسجد خالد بن الوليد · مربع الوعر</div>
</div>
<span style="position:relative;width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:var(--text-1)">
<i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/bell.svg)"></i>
<span style="position:absolute;top:4px;inset-inline-start:24px;min-width:18px;height:18px;padding:0 4px;border-radius:var(--r-full);background:var(--danger-fg);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)">٣</span>
</span>
</div>
</div>
<span class="lbl">شريط التنقّل السفلي — ٦ وجهات، النشط بحبّة خضراء</span>
<div class="frame" style="background:var(--surface)">
<nav style="display:flex;border-top:1px solid var(--border)">
<button class="navi" style="color:var(--primary)"><span class="pill" style="background:var(--primary-soft)"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/house.svg)"></i></span><span class="t" style="font-weight:600">الرئيسية</span></button>
<button class="navi"><span class="pill"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/landmark.svg)"></i></span><span class="t">مسجدي</span></button>
<button class="navi"><span class="pill"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/calendar-days.svg)"></i></span><span class="t">النشاطات</span><span style="position:absolute;top:6px;inset-inline-start:calc(50% + 6px);width:8px;height:8px;border-radius:50%;background:var(--danger-fg)"></span></button>
<button class="navi"><span class="pill"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/library.svg)"></i></span><span class="t">المكتبة</span></button>
<button class="navi"><span class="pill"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/book-open.svg)"></i></span><span class="t">المنهاج</span></button>
<button class="navi"><span class="pill"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/ellipsis.svg)"></i></span><span class="t">المزيد</span></button>
</nav>
</div>
<span class="lbl">Tabs — نشط بخط سفلي، مع عدّاد ومعطّل</span>
<div style="display:flex;gap:4px;border-bottom:1px solid var(--border)">
<button class="tab" style="color:var(--primary);font-weight:600;box-shadow:inset 0 -2px 0 var(--primary)">الكل<span style="font-size:12px;font-weight:600;background:var(--primary-soft);border-radius:var(--r-full);padding:1px 8px">١٢</span></button>
<button class="tab">معلّق<span style="font-size:12px;font-weight:600;background:var(--surface-2);border-radius:var(--r-full);padding:1px 8px">٢</span></button>
<button class="tab">متأخر</button>
<button class="tab" style="color:var(--text-disabled);cursor:default">مؤرشف</button>
</div>
</div>
<div class="col" style="max-width:240px">
<span class="lbl">الشريط الجانبي المكتبي</span>
<div class="frame" style="background:var(--surface);padding:12px">
<div style="font-weight:700;font-size:var(--fs-section);padding:4px 12px 12px">مشكاة</div>
<div style="padding:4px 12px 6px;font-size:11px;font-weight:600;color:var(--text-3)">الإشراف</div>
<button class="side" style="background:var(--primary-soft);color:var(--primary);font-weight:600"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/layout-dashboard.svg)"></i><span style="flex:1">اللوحة</span></button>
<button class="side ds-hover"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/map.svg)"></i><span style="flex:1">المناطق</span></button>
<button class="side ds-hover"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/landmark.svg)"></i><span style="flex:1">المساجد</span><span style="font-size:12px;font-weight:600;background:var(--surface-2);border-radius:var(--r-full);padding:2px 8px">٤٠٠</span></button>
<button class="side ds-hover"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/badge-check.svg)"></i><span style="flex:1">الاعتمادات</span><span style="font-size:12px;font-weight:600;background:var(--danger-bg);color:var(--danger-fg);border-radius:var(--r-full);padding:2px 8px">١٧</span></button>
<button class="side ds-hover"><i class="ic" style="--m:url(https://unpkg.com/lucide-static@0.462.0/icons/users.svg)"></i><span style="flex:1">الكوادر</span></button>
</div>
</div>
</body></html>
