<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>لوحة متابعة المحافظة — المسجد المؤثر (نموذج أولي)</title>
<style>
:root{
  --bg:#f4f3ee;--card:#fff;--ink:#1c1c1a;--muted:#5f5e5a;--hint:#888780;
  --line:rgba(0,0,0,.12);--line2:rgba(0,0,0,.22);
  --info-bg:#e6f1fb;--info:#185fa5;--ok:#3b6d11;--warn:#854f0b;--danger:#a32d2d;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;padding:16px}
.wrap{max-width:640px;margin:0 auto}
.top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
.title{font-size:18px;font-weight:500}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.mc{background:var(--card);border:.5px solid var(--line);border-radius:var(--r);padding:12px}
.mc .lab{font-size:12px;color:var(--muted)}
.mc .val{font-size:22px;font-weight:500;margin-top:3px}
.filters{display:flex;gap:8px;margin-bottom:6px}
.fbtn{padding:6px 12px;border:.5px solid var(--line2);background:transparent;font-size:13px;border-radius:var(--r);cursor:pointer;color:var(--muted)}
.fbtn.on{background:var(--info-bg);color:var(--info);border-color:var(--info)}
.list{background:var(--card);border:.5px solid var(--line);border-radius:var(--rl);padding:4px 14px}
.mrow{display:grid;grid-template-columns:18px 1fr 88px 64px;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--line);cursor:pointer}
.mrow:last-child{border-bottom:0}
.barbg{height:6px;background:var(--line);border-radius:99px;overflow:hidden;width:80px}
.fine{font-size:11px;color:var(--hint);margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">📍</span><span class="title">محافظة إدلب</span></div>
    <span style="font-size:13px;color:var(--muted)">الأسبوع 27 ذو الحجة 1447هـ</span>
  </div>
  <div class="cards">
    <div class="mc"><div class="lab">المساجد</div><div class="val">24</div></div>
    <div class="mc"><div class="lab">أدخلت اليوم</div><div class="val" style="color:var(--ok)">19</div></div>
    <div class="mc"><div class="lab">متأخرة</div><div class="val" style="color:var(--danger)">5</div></div>
    <div class="mc"><div class="lab">متوسط النقاط</div><div class="val">58<span style="font-size:13px;color:var(--hint)"> /70</span></div></div>
  </div>
  <div class="filters">
    <button class="fbtn on" id="f-all" onclick="setF('all')">الكل (24)</button>
    <button class="fbtn" id="f-late" onclick="setF('late')">المتأخرون (5)</button>
    <button class="fbtn" id="f-top" onclick="setF('top')">الأعلى نقاطاً</button>
  </div>
  <div class="list" id="list"></div>
  <p class="fine">«متأخر» = لم يُدخل سجله منذ يومين. يرى مسؤول المحافظة مساجده فقط (نطاقه)، وينقر المسجد للغوص في تفاصيله.</p>
</div>
<script>
const M=[
 {n:"مسجد الفاروق",mrb:"مربع 1",p:67,d:0},{n:"مسجد النور",mrb:"مربع 1",p:64,d:0},
 {n:"مسجد التقوى (نساء)",mrb:"مربع 1",p:61,d:1},{n:"مسجد بلال",mrb:"مربع 2",p:59,d:0},
 {n:"مسجد القدس",mrb:"مربع 2",p:55,d:0},{n:"مسجد الرحمة",mrb:"مربع 2",p:52,d:1},
 {n:"مسجد الصحابة",mrb:"مربع 3",p:48,d:0},{n:"مسجد عثمان",mrb:"مربع 3",p:44,d:3},
 {n:"مسجد الإيمان (نساء)",mrb:"مربع 3",p:39,d:2},{n:"مسجد حمزة",mrb:"مربع 1",p:31,d:4},
 {n:"مسجد الهدى",mrb:"مربع 2",p:22,d:5}
];
let f='all';
function setF(x){f=x;['all','late','top'].forEach(k=>document.getElementById('f-'+k).classList.toggle('on',k===x));render();}
function color(p){return p>=56?'var(--ok)':p>=40?'var(--warn)':'var(--danger)';}
function render(){
  let rows=M.slice();
  if(f==='late')rows=rows.filter(m=>m.d>=2);
  if(f==='top')rows.sort((a,b)=>b.p-a.p);
  const box=document.getElementById('list');box.innerHTML='';
  rows.forEach((m,i)=>{
    const late=m.d>=2;
    const r=document.createElement('div');r.className='mrow';
    r.innerHTML='<span style="font-size:12px;color:var(--hint)">'+(i+1)+'</span>'+
      '<div style="min-width:0"><div style="font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+m.n+'</div>'+
      '<div style="font-size:11px;color:var(--hint)">'+m.mrb+(late?' · آخر إدخال قبل '+m.d+' أيام':' · مُحدَّث')+'</div></div>'+
      '<div style="text-align:left"><div class="barbg"><div style="height:100%;width:'+Math.min(100,Math.round(m.p/70*100))+'%;background:'+color(m.p)+'"></div></div></div>'+
      '<div style="text-align:left;font-weight:500;color:'+color(m.p)+'">'+m.p+'<span style="font-size:11px;color:var(--hint)">/70</span></div>';
    r.onclick=()=>alert('فتح تفاصيل '+m.n+' (مساجد، أعضاء، سجلات الأسبوع).');
    box.appendChild(r);
  });
}
render();
</script>
</body>
</html>
